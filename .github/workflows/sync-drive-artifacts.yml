name: Sync Drive Artifacts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run rclone in dry-run mode and do not open a PR"
        required: false
        default: false
        type: boolean
      remote:
        description: "rclone remote path to sync"
        required: false
        default: "gdrive:/jianglens/youtube"
        type: string

permissions:
  checks: write
  contents: write
  pull-requests: write

concurrency:
  group: sync-drive-artifacts
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      LENS_COMPRESSION_DRIVE_REMOTE: ${{ inputs.remote }}
      LENS_COMPRESSION_DRIVE_LOCAL: ${{ github.workspace }}/content/sources/raw/youtube
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone version

      - name: Configure rclone
        env:
          RCLONE_CONFIG_GDRIVE: ${{ secrets.RCLONE_CONFIG_GDRIVE }}
        run: |
          set -euo pipefail
          if [ -z "${RCLONE_CONFIG_GDRIVE}" ]; then
            echo "Missing repository secret RCLONE_CONFIG_GDRIVE" >&2
            exit 1
          fi
          mkdir -p "$HOME/.config/rclone"
          printf '%s\n' "${RCLONE_CONFIG_GDRIVE}" > "$HOME/.config/rclone/rclone.conf"
          chmod 600 "$HOME/.config/rclone/rclone.conf"
          rclone listremotes | grep -qx 'gdrive:'

      - name: Sync Drive text artifacts
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ./ops/notebooks/colab/sync-drive.sh --dry-run
          else
            ./ops/notebooks/colab/sync-drive.sh
          fi

      - name: Summarize changes
        run: |
          git status --short content/sources/raw/youtube

      - name: Set up Node
        if: ${{ inputs.dry_run == false }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Open sync PR
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- content/sources/raw/youtube; then
            echo "No Drive artifact changes to propose."
            exit 0
          fi

          branch="sync/drive-artifacts-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add content/sources/raw/youtube
          git commit -m "Sync Drive source artifacts"
          git push --set-upstream origin "${branch}"
          pr_url="$(gh pr create \
            --base main \
            --head "${branch}" \
            --title "Sync Drive source artifacts" \
            --body "Manual Google Drive artifact sync from \`${LENS_COMPRESSION_DRIVE_REMOTE}\` into \`content/sources/raw/youtube\`. This PR contains text and metadata artifacts only; audio and video remain outside git.")"
          echo "Created ${pr_url}"

          commit_sha="$(git rev-parse HEAD)"
          check_id="$(gh api -X POST "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="validate-and-build" \
            -f head_sha="${commit_sha}" \
            -f status="in_progress" \
            -f started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f details_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --jq .id)"

          if node ops/scripts/compile-content.mjs \
            && node ops/scripts/validate-content.mjs \
            && npm --prefix website ci \
            && npm --prefix website run build; then
            conclusion="success"
            title="Drive sync validation passed"
            summary="Content compilation, content validation, and website build passed for ${branch}."
          else
            conclusion="failure"
            title="Drive sync validation failed"
            summary="Content compilation, content validation, or website build failed for ${branch}. Check this workflow run for logs."
          fi

          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/check-runs/${check_id}" \
            -f status="completed" \
            -f conclusion="${conclusion}" \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f "output[title]=${title}" \
            -f "output[summary]=${summary}"

          if [ "${conclusion}" != "success" ]; then
            exit 1
          fi
